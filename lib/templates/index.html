<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Šachový Prediktor</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .highlight-ai {
            box-shadow: inset 0 0 3px 3px rgba(255, 255, 0, 0.8) !important;
            background-color: rgba(255, 255, 0, 0.4) !important;
        }
        .ai-ghost-piece {
            opacity: 0.6;
            filter: drop-shadow(0 0 5px yellow);
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container glass-panel">
        <header>
            <h1>AI Šachový Prediktor</h1>
            <p>Natrénováno na statisících partií. Učte se předvídat další tah se šachovým AI Asistentem.</p>
        </header>

        <div class="app-grid">
            <div class="board-section">
                <div id="board" class="board-container"></div>
                <div class="controls">
                    <button id="resetBtn" class="primary-btn">Nová hra</button>
                    <button id="undoBtn" class="secondary-btn">Krok zpět</button>
                </div>
            </div>

            <div class="evaluation-section" style="display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 2rem;">
                <h2>AI Asistent</h2>
                
                <div class="controls toggle-container" style="margin-top: 2rem;">
                    <label class="toggle-label" style="display:flex; align-items:center; gap: 15px; font-weight: 600; cursor: pointer; font-size: 1.2rem; color: #fff;">
                        <input type="checkbox" id="aiToggle" style="width: 25px; height: 25px;">
                        Zobrazit nápovědu (Stín tahu)
                    </label>
                </div>

                <div class="status-panel" style="margin-top: 3rem; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 20px; width: 100%;">
                    <h3 style="color: #4CAF50;">Status Hry</h3>
                    <p id="game-status" style="font-size: 1.1rem; color: #ddd; margin-top: 10px;">Bílý je na tahu.</p>
                    <p id="ai-commentary" style="margin-top: 1rem; color: #fff; font-weight: bold;"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- jQuery (required by chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    
    <!-- Chessboard.js & Chess.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <!-- Custom Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
