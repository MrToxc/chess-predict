<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Šachový Prediktor</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container glass-panel">
        <header>
            <h1>AI Šachový Prediktor</h1>
            <p>Natrénováno na 100 000 partiích. Udělej tah a sleduj, jak umělá inteligence hodnotí tvé šance.</p>
        </header>

        <div class="app-grid">
            <div class="board-section">
                <div id="board" class="board-container"></div>
                <div class="controls">
                    <button id="resetBtn" class="primary-btn">Nová hra</button>
                    <button id="undoBtn" class="secondary-btn">Krok zpět</button>
                </div>
            </div>

            <div class="evaluation-section">
                <h2>Živá AI Analýza</h2>
                
                <div class="eval-bar-container">
                    <div class="eval-labels">
                        <span class="label-white">Bílý</span>
                        <span class="label-draw">Remíza</span>
                        <span class="label-black">Černý</span>
                    </div>
                    
                    <div class="eval-tube">
                        <div id="bar-white" class="eval-fill fill-white" style="width: 50%;">
                            <span class="percent-val" id="val-white">50.0%</span>
                        </div>
                        <div id="bar-draw" class="eval-fill fill-draw" style="width: 0%;">
                            <span class="percent-val" id="val-draw">0.0%</span>
                        </div>
                        <div id="bar-black" class="eval-fill fill-black" style="width: 50%;">
                            <span class="percent-val" id="val-black">50.0%</span>
                        </div>
                    </div>
                </div>

                <div class="status-panel">
                    <h3>Status Hry</h3>
                    <p id="game-status">Bílý je na tahu.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- jQuery (required by chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    
    <!-- Chessboard.js & Chess.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <!-- Custom Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
